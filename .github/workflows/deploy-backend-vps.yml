name: Deploy Backend to VPS

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "scripts/**"
      - "requirements.txt"
      - "data/processed/extracted_data_sahabatai.csv"
      - "deploy/**"
      - ".github/workflows/deploy-backend-vps.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "Missing secret: VPS_HOST" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "Missing secret: VPS_USER" && exit 1)
          test -n "${{ secrets.VPS_SSH_PRIVATE_KEY }}" || (echo "Missing secret: VPS_SSH_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.VPS_SSH_PORT }}" || (echo "Missing secret: VPS_SSH_PORT" && exit 1)
          test -n "${{ secrets.VPS_APP_DIR }}" || (echo "Missing secret: VPS_APP_DIR" && exit 1)
          test -n "${{ secrets.VPS_VENV_DIR }}" || (echo "Missing secret: VPS_VENV_DIR" && exit 1)

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync backend files only
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.VPS_SSH_PORT }}" \
            --filter='merge deploy/rsync-backend.filter' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Install deps and restart service
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
          set -e

          APP_DIR="${{ secrets.VPS_APP_DIR }}"
          VENV_DIR="${{ secrets.VPS_VENV_DIR }}"

          mkdir -p "$APP_DIR"

          python3 -m venv "$VENV_DIR"
          "$VENV_DIR/bin/pip" install --upgrade pip
          "$VENV_DIR/bin/pip" install -r "$APP_DIR/requirements.txt"

          sudo systemctl daemon-reload
          sudo systemctl restart coffeemate
          sudo systemctl --no-pager --full status coffeemate

          echo "Waiting for backend readiness..."
          if curl --fail --silent --show-error \
            --retry 60 \
            --retry-delay 3 \
            --retry-connrefused \
            "http://127.0.0.1:8000/health" > /dev/null; then
            echo "Backend is healthy."
            exit 0
          fi

          echo "Health check failed: /health is not ready"
          sudo journalctl -u coffeemate -n 50 --no-pager || true
          exit 1
          EOF
